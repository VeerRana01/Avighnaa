backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    files:
  - label: "Products"
    name: "products"
    file: "products/products.json"
    create: true
    slug: "{{slug}}"

    fields:
      - {label: "Product ID", name: "id", widget: "number"}
      - {label: "Product Name", name: "name", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Description", name: "description", widget: "text"}

      - label: "Images"
        name: "images"
        widget: "list"
        field: {label: Image, name: image, widget: image}

      - {label: "Video", name: "video", widget: "file", required: false}

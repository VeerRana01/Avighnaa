<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product | Avighnaa</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">
<a href="index.html">← Back</a>
</div>

<div class="product-details" id="product-details"></div>

<script src="products.js"></script>
<script src="cart.js"></script>

<script>

function getProduct(){

let id = new URLSearchParams(window.location.search).get("id");

let product = products.find(p => p.id == id);

if(!product){
document.getElementById("product-details").innerHTML =
"<h2>Product not found</h2>";
return;
}

/* IMAGES */
let imagesHTML = "";

product.images.forEach(img=>{
imagesHTML += `<img src="${img}" class="product-img">`;
});

/* MAIN HTML */
let html = `

<h2>${product.name}</h2>

<div class="image-gallery">
${imagesHTML}
</div>

${product.video ? `
<video width="100%" controls style="margin-top:15px; border-radius:10px;">
  <source src="${product.video}" type="video/mp4">
  Your browser does not support the video tag.
</video>
` : ""}

<p>${product.description}</p>

<h3>₹${product.price}</h3>

<button onclick="addToCart(${product.id})">
Add to Cart
</button>

<br><br>

<!-- ⭐ REVIEWS SECTION -->
<div id="reviews"></div>

<input type="text" id="reviewInput" placeholder="Write your review">
<button onclick="addReview()">Submit</button>

<br><br>

<a href="https://wa.me/919468199567?text=I want to order ${product.name}">
<button>Order on WhatsApp</button>
</a>

`;

document.getElementById("product-details").innerHTML = html;

}


/* ⭐ REVIEW FUNCTIONS (OUTSIDE) */

function addReview(){

let review = document.getElementById("reviewInput").value;

let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

reviews.push(review);

localStorage.setItem("reviews", JSON.stringify(reviews));

loadReviews();
}

function loadReviews(){

let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

let html = "<h3>Customer Reviews</h3>";

reviews.forEach(r=>{
html += `<p>⭐ ${r}</p>`;
});

document.getElementById("reviews").innerHTML = html;
}


/* LOAD DATA */

loadProductsFromJSON(function(){

getProduct();
updateCartCount();
loadReviews();

});

</script>

</body>
</html>

</body>
</html>
